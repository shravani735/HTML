<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Tag</title>
</head>
<body>
    <ol type="1">
        <li>t-shirt</li>
        <li>short kurti</li>
        <li>long kurti</li>
    </ol>
    <ul type="square">
        <li>pants</li>
        <li>skirts</li>
        <li>one piece</li>
    </ul>
    <dl>
        <dt>t-shirt</dt>
        <dd>m size</dd>
        <dt>short kurti</dt>
        <dd>s size</dd>
        <dt>long kurti</dt>
        <dd>l size</dd>
    </dl>
</body>
</html>
